<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка 404 - Страница не найдена</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Базовый глубокий темный цвет */
            background-color: #0d090a;
            
            /* Многослойный фон для создания оттенков и "штор" */
            background-image: 
                /* Левая "штора" (вертикальные красные переливы) */
                linear-gradient(90deg, 
                    rgba(180, 0, 15, 0.25) 0%, 
                    rgba(180, 0, 15, 0.1) 3%, 
                    transparent 5%, 
                    rgba(180, 0, 15, 0.05) 8%, 
                    transparent 12%, 
                    rgba(180, 0, 15, 0.02) 15%, 
                    transparent 20%),
                
                /* Правая "штора" (вертикальные красные переливы) */
                linear-gradient(-90deg, 
                    rgba(180, 0, 15, 0.25) 0%, 
                    rgba(180, 0, 15, 0.1) 3%, 
                    transparent 5%, 
                    rgba(180, 0, 15, 0.05) 8%, 
                    transparent 12%, 
                    rgba(180, 0, 15, 0.02) 15%, 
                    transparent 20%),
                
                /* Мягкие радиальные засветы для объема */
                radial-gradient(circle at 10% 10%, rgba(150, 0, 20, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(180, 0, 20, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(100, 0, 10, 0.1) 0%, transparent 60%);
                
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Логотип */
        .logo {
            margin-top: 50px;
            font-size: 36px;
            font-weight: 900;
            color: #ff001a;
            letter-spacing: -2px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 0, 26, 0.4); /* Усилил свечение логотипа */
            display: flex;
            align-items: center;
            z-index: 2;
        }

        /* Контейнер для центрирования основного контента */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            z-index: 2;
        }

        .error-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transform: scaleX(1.05);
        }

        .error-bg {
            font-size: clamp(40px, 8vw, 90px);
            font-weight: 900;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .error-bg:nth-child(1) { color: rgba(255, 255, 255, 0.05); }
        .error-bg:nth-child(2) { color: rgba(255, 255, 255, 0.12); }
        .error-bg:nth-child(3) { color: rgba(255, 255, 255, 0.35); }

        .error-main-row {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-top: -5px;
        }

        .error-main {
            font-size: clamp(40px, 8vw, 90px);
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
        }

        .error-code {
            color: #ffe100;
            margin-left: 15px;
        }

        .emoji {
            position: absolute;
            left: -110px;
            bottom: 20px;
            width: clamp(60px, 10vw, 110px);
            height: auto;
            transform: rotate(-10deg);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            pointer-events: none;
        }

        .arrow-container {
            position: absolute;
            right: -80px;
            bottom: 30px;
            width: 70px;
            pointer-events: none;
        }

        .arrow-container svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }

        .subtext {
            margin-top: 60px;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            line-height: 1.6;
            color: #c9c9c9;
            transform: scaleX(1);
        }

        .subtext a {
            color: #ffffff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .subtext a:hover {
            color: #ff001a;
            text-decoration: underline;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .emoji {
                left: -30px;
                top: -60px;
                bottom: auto;
            }
            .arrow-container {
                right: 0px;
                bottom: -50px;
                width: 50px;
            }
            .error-code {
                margin-left: 8px;
            }
        }
    </style>
</head>
<body>

    <header class="logo">
        Super-random.netlify.app
    </header>

    <main class="main-content">
        <div class="error-stack">
            <div class="error-bg">ОШИБКА</div>
            <div class="error-bg">ОШИБКА</div>
            <div class="error-bg">ОШИБКА</div>
            
            <div class="error-main-row">
                <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f62e/512.webp" alt="😲" class="emoji">
                
                <div class="error-main">
                    ОШИБКА <span class="error-code">#404</span>
                </div>

                <div class="arrow-container">
                    <svg viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M90 5 Q 90 60 15 65" stroke="#ffe100" stroke-width="3" stroke-linecap="round" fill="transparent"/>
                        <path d="M 25 53 L 13 65 L 28 75" stroke="#ffe100" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="transparent"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="subtext">
            Что-то пошло не так или этой страницы больше нет.<br>
            Вы можете <a href="/">вернуться на главную</a>
        </div>
    </main>

</body>
</html>
