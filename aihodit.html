<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Evolution: Laser Survival</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; color: #eee; font-family: sans-serif; }
        #ui { 
            position: absolute; top: 10px; left: 10px; z-index: 100; 
            background: rgba(0,0,0,0.85); padding: 12px; border-radius: 10px;
            border: 1px solid #444; width: 280px; font-size: 13px;
            max-height: 95vh; overflow-y: auto;
        }
        .row { display: flex; justify-content: space-between; margin-bottom: 5px; align-items: center; }
        .accent { color: #00ff00; font-weight: bold; }
        .laser-accent { color: #ff0044; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #333; margin: 10px 0; }
        button { 
            background: #333; color: white; border: 1px solid #555; padding: 5px; 
            border-radius: 4px; cursor: pointer; width: 100%; margin: 2px 0;
        }
        button:hover { background: #444; }
        input[type="range"] { width: 100%; }
        .btn-group { display: flex; gap: 5px; }
    </style>
</head>
<body>

<div id="ui">
    <b style="font-size: 16px;">AI Survivor v3.0</b>
    <div class="row"><span>Поколение:</span> <span id="gen" class="accent">1</span></div>
    <div class="row"><span>Лучший (сейчас):</span> <span id="bestCur" class="accent">0</span>м</div>
    <div class="row"><span>Рекорд (всегда):</span> <span id="bestEver" class="accent">0</span>м</div>
    <div class="row"><span>Время:</span> <span id="time">0</span>/600</div>
    
    <hr>
    <label>Ускорение: <b id="speedTxt">1x</b></label>
    <input type="range" id="speedRange" min="1" max="40" value="1">

    <label>Скорость Лазера: <b id="laserTxt">1.5</b></label>
    <input type="range" id="laserRange" min="0" max="10" step="0.1" value="1.5">

    <hr>
    <div class="row">
        <label><input type="checkbox" id="showReplay" checked> Повтор лучшего</label>
    </div>
    
    <button id="btnTrack">Следить за лидером</button>
    
    <hr>
    <b>Модель:</b>
    <div class="btn-group">
        <button onclick="saveModel()">💾 Сохранить</button>
        <button onclick="document.getElementById('fileIn').click()">📂 Загрузить</button>
    </div>
    <input type="file" id="fileIn" style="display:none" onchange="loadModel(event)">
    <button onclick="playHallOfFame()" style="background:#442266">🏆 Запуск Рекордсмена</button>
</div>

<script>
const { Engine, Render, Runner, Bodies, Body, Composite, Constraint, Events } = Matter;

// Конфигурация
const CONFIG = {
    popSize: 25,
    lifespan: 600,
    startX: 400,
    groundY: 600,
    laserStart: 0
};

// Физические категории для коллизий
const CAT_GROUND = 0x0001;
const CAT_L_LEG = 0x0002;
const CAT_R_LEG = 0x0004;
const CAT_TORSO = 0x0008;

const engine = Engine.create();
const world = engine.world;
const render = Render.create({
    element: document.body,
    engine: engine,
    options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#050505' }
});
Render.run(render);

// Земля
const ground = Bodies.rectangle(50000, CONFIG.groundY + 25, 100000, 50, { 
    isStatic: true, friction: 1, collisionFilter: { category: CAT_GROUND }, render: { fillStyle: '#222' } 
});
Composite.add(world, ground);

let creatures = [];
let generation = 1;
let frameCount = 0;
let bestDnaEver = null;
let bestDistEver = 0;
let laserX = CONFIG.laserStart;
let isReplay = false;
let autoTrack = true;

class Creature {
    constructor(x, y, dna, isChampion = false) {
        // ДНК: 40 весов (сложнее нейросеть для коленей и баланса)
        this.dna = dna || Array.from({length: 40}, () => (Math.random() - 0.5) * 2);
        this.alive = true;
        this.score = 0;

        const group = Body.nextGroup(true);
        const common = { friction: 0.9, density: 0.01 };

        // Торс (шире для крепления ног)
        this.torso = Bodies.rectangle(x, y, 45, 20, { 
            ...common, 
            collisionFilter: { category: CAT_TORSO },
            render: { fillStyle: isChampion ? '#FFD700' : '#E91E63' } 
        });

        // Левая нога
        this.thighL = Bodies.rectangle(x - 15, y + 25, 12, 35, { 
            ...common, collisionFilter: { category: CAT_L_LEG, mask: CAT_GROUND | CAT_R_LEG | CAT_TORSO } 
        });
        this.calfL = Bodies.rectangle(x - 15, y + 60, 10, 35, { 
            ...common, collisionFilter: { category: CAT_L_LEG, mask: CAT_GROUND | CAT_R_LEG | CAT_TORSO } 
        });

        // Правая нога
        this.thighR = Bodies.rectangle(x + 15, y + 25, 12, 35, { 
            ...common, collisionFilter: { category: CAT_R_LEG, mask: CAT_GROUND | CAT_L_LEG | CAT_TORSO } 
        });
        this.calfR = Bodies.rectangle(x + 15, y + 60, 10, 35, { 
            ...common, collisionFilter: { category: CAT_R_LEG, mask: CAT_GROUND | CAT_L_LEG | CAT_TORSO } 
        });

        // Соединения
        this.junts = [
            Constraint.create({ bodyA: this.torso, pointA: {x:-15, y:0}, bodyB: this.thighL, pointB: {x:0, y:-15}, stiffness: 0.8, length:0 }),
            Constraint.create({ bodyA: this.thighL, pointA: {x:0, y:15}, bodyB: this.calfL, pointB: {x:0, y:-15}, stiffness: 0.8, length:0 }),
            Constraint.create({ bodyA: this.torso, pointA: {x:15, y:0}, bodyB: this.thighR, pointB: {x:0, y:-15}, stiffness: 0.8, length:0 }),
            Constraint.create({ bodyA: this.thighR, pointA: {x:0, y:15}, bodyB: this.calfR, pointB: {x:0, y:-15}, stiffness: 0.8, length:0 })
        ];

        this.parts = [this.torso, this.thighL, this.calfL, this.thighR, this.calfR];
        this.composite = Composite.create();
        Composite.add(this.composite, [...this.parts, ...this.junts]);
        Composite.add(world, this.composite);
    }

    update() {
        if (!this.alive) return;

        // Входы: углы, угловые скорости и синус времени
        const inputs = [
            this.torso.angle, this.torso.angularVelocity,
            this.thighL.angle, this.calfL.angle,
            this.thighR.angle, this.calfR.angle,
            Math.sin(frameCount * 0.1), 1 // Bias
        ];

        // Нейросеть (4 мышцы)
        const outputs = [0, 0, 0, 0];
        for(let i=0; i<4; i++) {
            for(let j=0; j<8; j++) {
                outputs[i] += inputs[j] * this.dna[i*8 + j];
            }
            outputs[i] = Math.tanh(outputs[i]) * 0.2; // Мощность
        }

        // Применяем силы
        this.thighL.torque = outputs[0];
        this.calfL.torque = outputs[1];
        this.thighR.torque = outputs[2];
        this.calfR.torque = outputs[3];

        // Ограничение вращения торса (чтобы не крутились как пропеллер)
        if (Math.abs(this.torso.angle) > 1.5) this.torso.torque -= this.torso.angle * 0.05;

        this.score = this.torso.position.x - CONFIG.startX;

        // Проверка смерти от лазера
        if (this.torso.position.x < laserX) {
            this.die();
        }
    }

    die() {
        this.alive = false;
        this.parts.forEach(p => p.render.opacity = 0.2);
    }

    destroy() {
        Composite.remove(world, this.composite);
    }
}

function spawn(dnas) {
    creatures.forEach(c => c.destroy());
    creatures = [];
    laserX = CONFIG.laserStart;
    frameCount = 0;
    for(let i=0; i<CONFIG.popSize; i++) {
        creatures.push(new Creature(CONFIG.startX, CONFIG.groundY - 100, dnas ? dnas[i] : null));
    }
}

function evolve() {
    creatures.sort((a,b) => b.score - a.score);
    const best = creatures[0];
    
    if (best.score > bestDistEver) {
        bestDistEver = Math.round(best.score);
        bestDnaEver = [...best.dna];
        document.getElementById('bestEver').innerText = bestDistEver;
    }
    document.getElementById('bestCur').innerText = Math.round(best.score);

    const nextDnas = [];
    const parents = creatures.slice(0, 10); // Топ 10 выживших

    for(let i=0; i<CONFIG.popSize; i++) {
        let p = parents[Math.floor(Math.random() * parents.length)].dna;
        nextDnas.push(p.map(gene => Math.random() < 0.1 ? gene + (Math.random()-0.5)*0.5 : gene));
    }
    return nextDnas;
}

// Рендер лазера
Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    const screenLaserX = laserX - render.bounds.min.x;
    ctx.strokeStyle = '#ff0044';
    ctx.lineWidth = 5;
    ctx.shadowBlur = 15;
    ctx.shadowColor = 'red';
    ctx.beginPath();
    ctx.moveTo(screenLaserX, 0);
    ctx.lineTo(screenLaserX, window.innerHeight);
    ctx.stroke();
    ctx.shadowBlur = 0;
});

let nextDnas = null;
function loop() {
    const speed = isReplay ? 1 : parseInt(document.getElementById('speedRange').value);
    const laserStep = parseFloat(document.getElementById('laserRange').value);
    
    document.getElementById('speedTxt').innerText = speed + 'x';
    document.getElementById('laserTxt').innerText = laserStep;

    for(let s=0; s<speed; s++) {
        laserX += laserStep;
        frameCount++;
        creatures.forEach(c => c.update());
        Engine.update(engine, 1000/60);

        if (frameCount >= CONFIG.lifespan) {
            if (!isReplay) {
                nextDnas = evolve();
                if (document.getElementById('showReplay').checked) {
                    isReplay = true;
                    spawn([bestDnaEver]); // Показываем лучшего
                } else {
                    generation++;
                    spawn(nextDnas);
                }
            } else {
                isReplay = false;
                generation++;
                spawn(nextDnas);
            }
            break;
        }
    }

    // Камера
    if (autoTrack && creatures.length > 0) {
        let leader = creatures.find(c => c.alive) || creatures[0];
        let targetX = leader.torso.position.x;
        render.bounds.min.x += (targetX - window.innerWidth/3 - render.bounds.min.x) * 0.1;
        render.bounds.max.x = render.bounds.min.x + window.innerWidth;
    }

    document.getElementById('time').innerText = frameCount;
    document.getElementById('gen').innerText = generation;
    requestAnimationFrame(loop);
}

// Управление
document.getElementById('btnTrack').onclick = () => autoTrack = true;
window.addEventListener('wheel', () => autoTrack = false);
window.addEventListener('touchstart', () => autoTrack = false);

function saveModel() {
    if (!bestDnaEver) return alert("Еще нет рекорда!");
    const data = JSON.stringify({ dna: bestDnaEver, dist: bestDistEver });
    const blob = new Blob([data], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `best_ai_dna_${bestDistEver}m.json`;
    a.click();
}

function loadModel(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const data = JSON.parse(ev.target.result);
        bestDnaEver = data.dna;
        bestDistEver = data.dist;
        document.getElementById('bestEver').innerText = bestDistEver;
        spawn([bestDnaEver]);
    };
    reader.readAsText(e.target.files[0]);
}

function playHallOfFame() {
    if (!bestDnaEver) return;
    isReplay = true;
    spawn([bestDnaEver]);
}

spawn(null);
loop();
</script>
</body>
</html>
